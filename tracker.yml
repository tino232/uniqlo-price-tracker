name: Uniqlo Price Tracker

on:
  schedule:
    # Runs every 3 days at 09:00 UTC (16:00 Vietnam time)
    - cron: "0 2 */3 * *"
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  track:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to push state.json back

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tracker
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python tracker.py

      - name: Save updated state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "chore: update price state [skip ci]"
          git push
